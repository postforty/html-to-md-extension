<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>HTML to MD Saver 설정</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; }
    h1 { font-size: 18px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    input[type="text"] { width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 15px; background: #0078D7; color: white; border: none; border-radius: 5px; cursor: pointer; }
    button:hover { background: #005A9E; }
    #status { margin-top: 15px; color: green; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Gemini API 설정</h1>
  <p>마크다운 번역 기능을 사용하려면 Gemini API Key가 필요합니다.</p>
  <label for="apiKey">Gemini API Key:</label>
  <input type="text" id="apiKey" placeholder="AIzaSy...">
  
  <label for="translateMode">기본 저장 방식:</label>
  <select id="translateMode" style="width: 100%; padding: 8px; margin-bottom: 20px; border-radius: 4px; border: 1px solid #ccc;">
    <option value="only">번역본만 저장</option>
    <option value="both">원본과 번역본 함께 저장</option>
  </select>

  <button id="saveBtn">저장하기</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
