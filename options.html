<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <title>HTML to MD Saver 설정</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      max-width: 400px;
    }

    h1 {
      font-size: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .input-group {
      display: flex;
      margin-bottom: 15px;
    }

    .input-group input {
      border-radius: 4px 0 0 4px;
      border-right: none;
      margin-bottom: 0;
    }

    .input-group button {
      padding: 0 10px;
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ccc;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
      font-size: 14px;
    }

    .input-group button:hover {
      background: #e0e0e0;
    }

    #saveBtn {
      padding: 10px 15px;
      background: linear-gradient(135deg, #FF5A00 0%, #E65100 100%);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #saveBtn:hover {
      background: linear-gradient(135deg, #E65100 0%, #CC4800 100%);
    }

    #status {
      margin-top: 15px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <h1>Gemini API 설정</h1>
  <p>마크다운 번역 기능을 사용하려면 Gemini API Key가 필요합니다.</p>
  <label for="apiKey">Gemini API Key:</label>
  <div class="input-group">
    <input type="password" id="apiKey" placeholder="AIzaSy...">
    <button type="button" id="toggleApiKey" title="비밀번호 표시/숨기기"
      style="display: flex; align-items: center; justify-content: center;">
      <svg id="eyeIconOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      <svg id="eyeIconClosed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
        <path
          d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
        </path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      </svg>
    </button>
  </div>

  <label for="translateMode">기본 저장 방식:</label>
  <select id="translateMode"
    style="width: 100%; padding: 8px; margin-bottom: 20px; border-radius: 4px; border: 1px solid #ccc;">
    <option value="original">원본</option>
    <option value="only">번역본</option>
    <option value="both">원본 + 번역본</option>
  </select>

  <button id="saveBtn">저장하기</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>

</html>
